name: Build hosts and push to cache.kai.run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: native
    strategy:
      fail-fast: false
      matrix:
        host: [c3, heartofgold, silverwind, starhaven]
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check token
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          if [ -z "$GIT_TOKEN" ]; then
            echo "GIT_TOKEN is empty — secret not wired up"; exit 1
          fi
          echo "Token length: ${#GIT_TOKEN}"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "oauth2:$GIT_TOKEN" \
            "http://c3.wol.int.kai.run:31415/Smephite/nichts-unfree/info/refs?service=git-upload-pack")
          echo "git-HTTP status: $code"
          [ "$code" = "200" ]
          echo "--- git ls-remote ---"
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 \
            git ls-remote "http://oauth2:$GIT_TOKEN@c3.wol.int.kai.run:31415/Smephite/nichts-unfree" 2>&1 \
            | sed "s/$GIT_TOKEN/***/g" | head -80

      - name: Build ${{ matrix.host }}
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          nix build --print-build-logs --no-link --print-out-paths \
            --override-input nichts-unfree "git+http://oauth2:$GIT_TOKEN@c3.wol.int.kai.run:31415/Smephite/nichts-unfree" \
            ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" \
            > out-paths.txt
          cat out-paths.txt

      - name: Push to cache.kai.run
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          attic login c3 https://cache.kai.run "$ATTIC_TOKEN"
          xargs -r attic push c3:nixos < out-paths.txt
